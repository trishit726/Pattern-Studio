<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Studio</title>
    <style>
      /* Design system adopted from halfof8/patterngen-oss (MIT). Monochrome
         chrome, the accent lives in the content. */
      :root {
        --bg: #000;
        --fg: #e0e0e0;
        --fg-strong: #ffffff;
        --muted: #888;
        --muted-2: #666;
        --muted-3: #444;
        --btn: #888;
        --panel: #0c0c0c;
        --bar-filled: #ccc;
        --bar-empty: #2c2c2c;
        --input-underline: #444;
        --input-text: #ccc;
        --accent: #f74026;
      }
      :root[data-theme="light"] {
        --bg: #f0f0f0;
        --fg: #1a1a1a;
        --fg-strong: #000;
        --muted: #666;
        --muted-2: #888;
        --muted-3: #bbb;
        --btn: #000;
        --panel: #e7e7e7;
        --bar-filled: #333;
        --bar-empty: #ccc;
        --input-underline: #bbb;
        --input-text: #333;
        --accent: #f74026;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }

      .line-input {
        width: 100%;
        background: none;
        border: none;
        border-bottom: 4px solid var(--input-underline);
        border-radius: 0;
        color: var(--input-text);
        padding: 2px 0;
        font-size: 22px;
        font-weight: 600;
        font-family: inherit;
        outline: none;
      }
      .auto-input {
        field-sizing: content;
        min-inline-size: 4ch;
        background: none;
        border: none;
        border-bottom: 4px solid var(--input-underline);
        color: var(--input-text);
        padding: 2px 0;
        font-size: 22px;
        font-weight: 600;
        font-family: inherit;
        outline: none;
        text-align: right;
      }

      .link-btn {
        background: none; border: none; color: var(--btn);
        font-size: 22px; font-weight: 600; letter-spacing: 0.04em;
        text-transform: uppercase; cursor: pointer; padding: 0; font-family: inherit;
        transition: color 160ms ease;
      }
      .link-btn:hover { color: var(--fg-strong); }
      .link-btn.accent { color: var(--accent); }
      .link-btn:disabled { opacity: 0.4; cursor: default; }

      .bar-step {
        transition:
          background 220ms cubic-bezier(0.4, 0, 0.2, 1),
          transform 180ms cubic-bezier(0.34, 1.56, 0.64, 1),
          filter 180ms ease;
        transform-origin: center; will-change: transform;
      }
      .bar-step:hover { transform: scaleY(1.25); filter: brightness(1.15); }
      .bar-step:active { transform: scaleY(0.85); transition-duration: 80ms; }

      .swatch {
        width: 60px; height: 60px; border-radius: 4px; position: relative;
        cursor: pointer; overflow: hidden; border: 2px solid var(--muted-3);
      }
      .swatch input { position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px); border: none; padding: 0; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
